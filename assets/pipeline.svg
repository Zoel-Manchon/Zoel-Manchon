<svg viewBox="0 0 880 348" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Animated terminal panel showing Zoel's data pipeline: edge sensors to link to backend to store to telemetry, with a security layer scanning across all of it.">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3fb950" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="bandclip"><rect x="40" y="208" width="800" height="40" rx="8"/></clipPath>
    <style>
      .chip { fill:#161b22; stroke:#30363d; stroke-width:1; }
      .name { fill:#e6edf3; font-size:12px; font-weight:700; letter-spacing:1.5px; }
      .sub  { fill:#7d8590; font-size:9px; }
      .ui   { fill:#7d8590; font-size:11px; }
      .uidim{ fill:#484f58; font-size:11px; }
      .acc  { fill:#3fb950; }
    </style>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="878" height="346" rx="12" fill="#0d1117" stroke="#30363d"/>
  <!-- title bar -->
  <circle cx="24" cy="24" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="24" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="24" r="6" fill="#27c93f"/>
  <text x="88" y="28" class="ui">zoel@manchon</text>
  <text x="187" y="28" class="uidim">: ~/system $ ./run --watch</text>
  <circle cx="812" cy="24" r="4" class="acc">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="824" y="28" class="acc" font-size="11">live</text>
  <line x1="1" y1="44" x2="879" y2="44" stroke="#21262d"/>

  <!-- rail -->
  <line x1="100" y1="130" x2="780" y2="130" stroke="#30363d" stroke-width="1.5"/>

  <!-- ============ NODES ============ -->
  <!-- 01 EDGE -->
  <g transform="translate(100,0)">
    <rect class="chip" x="-58" y="88" width="116" height="86" rx="9"/>
    <g transform="translate(0,108)" stroke="#3fb950" stroke-width="1.6" fill="none" stroke-linecap="round">
      <rect x="-8" y="-8" width="16" height="16" rx="2.5"/>
      <circle cx="0" cy="0" r="2.4" class="acc" stroke="none"/>
      <line x1="-8" y1="-3.5" x2="-12" y2="-3.5"/><line x1="-8" y1="3.5" x2="-12" y2="3.5"/>
      <line x1="8" y1="-3.5" x2="12" y2="-3.5"/><line x1="8" y1="3.5" x2="12" y2="3.5"/>
      <line x1="-3.5" y1="-8" x2="-3.5" y2="-12"/><line x1="3.5" y1="-8" x2="3.5" y2="-12"/>
    </g>
    <text class="name" x="0" y="146" text-anchor="middle">EDGE</text>
    <text class="sub"  x="0" y="161" text-anchor="middle">ESP32 · sensors</text>
    <text class="uidim" x="-50" y="102" font-size="9">01</text>
  </g>

  <!-- 02 LINK -->
  <g transform="translate(270,0)">
    <rect class="chip" x="-58" y="88" width="116" height="86" rx="9"/>
    <g transform="translate(0,109)" stroke="#39c5cf" stroke-width="1.6" fill="none" stroke-linecap="round">
      <circle cx="0" cy="6" r="2.2" fill="#39c5cf" stroke="none"/>
      <path d="M-5,2.5 a7,7 0 0 1 10,0"/>
      <path d="M-9,-1 a11,11 0 0 1 18,0"/>
      <path d="M-13,-4.5 a15,15 0 0 1 26,0" opacity="0.5"/>
    </g>
    <text class="name" x="0" y="146" text-anchor="middle">LINK</text>
    <text class="sub"  x="0" y="161" text-anchor="middle">LoRa · MQTT</text>
    <text class="uidim" x="-50" y="102" font-size="9">02</text>
  </g>

  <!-- 03 BACKEND -->
  <g transform="translate(440,0)">
    <rect class="chip" x="-58" y="88" width="116" height="86" rx="9"/>
    <g transform="translate(0,108)" stroke="#3fb950" stroke-width="1.6" fill="none">
      <rect x="-10" y="-9" width="20" height="8" rx="2"/>
      <rect x="-10" y="2" width="20" height="8" rx="2"/>
      <circle cx="-6" cy="-5" r="1.1" class="acc" stroke="none"/>
      <circle cx="-6" cy="6" r="1.1" class="acc" stroke="none"/>
      <line x1="3" y1="-5" x2="7" y2="-5" stroke-linecap="round"/>
      <line x1="3" y1="6" x2="7" y2="6" stroke-linecap="round"/>
    </g>
    <text class="name" x="0" y="146" text-anchor="middle">BACKEND</text>
    <text class="sub"  x="0" y="161" text-anchor="middle">Rust · Axum</text>
    <text class="uidim" x="-50" y="102" font-size="9">03</text>
  </g>

  <!-- 04 STORE -->
  <g transform="translate(610,0)">
    <rect class="chip" x="-58" y="88" width="116" height="86" rx="9"/>
    <g transform="translate(0,108)" stroke="#3fb950" stroke-width="1.6" fill="none">
      <ellipse cx="0" cy="-7" rx="9" ry="3.4"/>
      <path d="M-9,-7 V7 a9,3.4 0 0 0 18,0 V-7"/>
      <path d="M-9,0 a9,3.4 0 0 0 18,0"/>
    </g>
    <text class="name" x="0" y="146" text-anchor="middle">STORE</text>
    <text class="sub"  x="0" y="161" text-anchor="middle">Postgres · Redis</text>
    <text class="uidim" x="-50" y="102" font-size="9">04</text>
  </g>

  <!-- 05 TELEMETRY -->
  <g transform="translate(780,0)">
    <rect class="chip" x="-58" y="88" width="116" height="86" rx="9"/>
    <g transform="translate(0,108)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="-11,5 -6,-1 -1,3 4,-7 11,-4" stroke="#39c5cf" stroke-width="1.8"
                stroke-dasharray="46" stroke-dashoffset="46">
        <animate attributeName="stroke-dashoffset" values="46;0" dur="2.2s" begin="0s" repeatCount="indefinite"/>
      </polyline>
    </g>
    <text class="name" x="0" y="146" text-anchor="middle">TELEMETRY</text>
    <text class="sub"  x="0" y="161" text-anchor="middle">Influx · Grafana</text>
    <text class="uidim" x="-50" y="102" font-size="9">05</text>
  </g>

  <!-- ============ DATA PACKETS ============ -->
  <g fill="#3fb950" filter="url(#glow)">
    <circle r="3.6">
      <animateMotion path="M64,130 H816" dur="4.4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.04;0.5;0.96;1" dur="4.4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.6">
      <animateMotion path="M64,130 H816" dur="4.4s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.04;0.5;0.96;1" dur="4.4s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.6">
      <animateMotion path="M64,130 H816" dur="4.4s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.04;0.5;0.96;1" dur="4.4s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.6">
      <animateMotion path="M64,130 H816" dur="4.4s" begin="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.04;0.5;0.96;1" dur="4.4s" begin="3.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ SECURITY LAYER ============ -->
  <rect x="40" y="208" width="800" height="40" rx="8" fill="#161b22" stroke="#d29922" stroke-opacity="0.45" stroke-dasharray="4 4"/>
  <g clip-path="url(#bandclip)">
    <rect x="-80" y="208" width="80" height="40" fill="url(#scan)">
      <animate attributeName="x" from="-80" to="880" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g transform="translate(64,228)" stroke="#d29922" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <path d="M0,-9 L7,-6 V1 C7,5.5 0,9 0,9 C0,9 -7,5.5 -7,1 V-6 Z"/>
    <path d="M-3,0 l2,2.2 l4,-4.4" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <text x="84" y="232" fill="#d29922" font-size="11" letter-spacing="0.5">security</text>
  <text x="146" y="232" class="uidim" font-size="11">— zero-trust · audit trails · OT hardening · runs across every layer</text>

  <!-- ============ PROMPT ============ -->
  <text x="40" y="290" class="acc" font-size="12">$</text>
  <text x="56" y="290" class="ui" font-size="12">streaming sensor → secured store</text>
  <rect x="312" y="280" width="8" height="13" class="acc">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.05s" repeatCount="indefinite"/>
  </rect>
  <text x="840" y="290" class="uidim" font-size="11" text-anchor="end">5 stages · 0 dropped</text>
</svg>
